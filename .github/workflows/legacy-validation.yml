name: Validar legado da Personalize

on:
  push:
    branches:
      - agent/etapa-1-proteger-legado-prod
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  legacy:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Validar sintaxe e legado
        run: npm run verify
