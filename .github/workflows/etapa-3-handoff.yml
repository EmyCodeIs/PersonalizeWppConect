name: Etapa 3 - Handoff permanente

on:
  push:
    branches:
      - agent/etapa-3-handoff-etiqueta-permanente
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: etapa-3-handoff-${{ github.ref }}
  cancel-in-progress: true

jobs:
  handoff:
    name: Handoff e suíte atual (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Preparar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências bloqueadas
        run: npm ci --no-audit --no-fund

      - name: Validar sintaxe
        run: npm run check

      - name: Validar handoff permanente
        run: npm run test:permanent-handoff

      - name: Executar suíte completa
        run: npm test
