name: Prontidao VPS

on:
  push:
    branches:
      - feat/stage-a-short-memory-ttl
  pull_request:

jobs:
  readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PUPPETEER_SKIP_DOWNLOAD: 'true'
    steps:
      - name: Baixar projeto
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalar dependencias
        run: npm install

      - name: Verificar scripts da VPS
        run: |
          bash -n scripts/load-dotenv.sh
          bash -n scripts/start-session-access.sh
          bash -n scripts/stop-session-access.sh
          bash -n scripts/session-access-health.sh
          bash -n scripts/watch-session-access.sh
          bash -n scripts/start-vps-whatsapp.sh
          bash -n scripts/install-session-access-ubuntu.sh
          bash -n scripts/configure-nginx-access.sh
          bash -n scripts/backup-vps-state.sh
          bash -n scripts/vps-preflight.sh
          node --check ecosystem.config.cjs

      - name: Conferir template seguro do Nginx
        run: |
          grep -q 'listen 443 ssl' deploy/nginx-whatsapp.conf
          grep -q 'auth_basic_user_file' deploy/nginx-whatsapp.conf
          grep -q 'proxy_pass http://127.0.0.1:6080' deploy/nginx-whatsapp.conf
          grep -q 'return 301 https://' deploy/nginx-whatsapp.conf

      - name: Testar carregamento seguro do ambiente
        run: |
          cat > /tmp/personalize-test.env <<'EOF'
          SELLER_LABEL_RULES=Adriano=#8FD0A8;Ana=#00A4F2;Emy=#7FE51F;C. Eduardo=#FEB100
          SESSION_ACCESS_PUBLIC_URL=https://whatsapp.exemplo.com/vnc.html?autoconnect=true&resize=scale
          EOF
          source scripts/load-dotenv.sh
          load_dotenv_file /tmp/personalize-test.env
          test "$SELLER_LABEL_RULES" = 'Adriano=#8FD0A8;Ana=#00A4F2;Emy=#7FE51F;C. Eduardo=#FEB100'
          test "$SESSION_ACCESS_PUBLIC_URL" = 'https://whatsapp.exemplo.com/vnc.html?autoconnect=true&resize=scale'

      - name: Verificar sintaxe e regressoes
        run: npm test
