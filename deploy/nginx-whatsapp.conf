# Substitua __DOMAIN__ pelo subdomínio real antes de ativar.
# Este arquivo deve ser incluído dentro do bloco http do Nginx
# (o padrão do Ubuntu inclui sites-enabled/* nesse contexto).

limit_req_zone $binary_remote_addr zone=whatsapp_remote:10m rate=10r/m;
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __DOMAIN__;

    ssl_certificate /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    auth_basic "Acesso restrito ao WhatsApp";
    auth_basic_user_file /etc/nginx/.htpasswd-whatsapp;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy no-referrer always;
    add_header Cache-Control "no-store" always;

    client_max_body_size 1m;

    location / {
        limit_req zone=whatsapp_remote burst=20 nodelay;

        proxy_pass http://127.0.0.1:6080;
        proxy_http_version 1.1;
        proxy_buffering off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
